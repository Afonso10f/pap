<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo - São Tomé e Príncipe</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Página de Login -->
    <div id="loginPage" class="login-page">
        <div class="ocean-background">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
            <div class="wave wave3"></div>
        </div>
        
        <div class="login-container">
            <div class="logo-container">
                <div class="logo-circle">
                    <span class="logo-icon">🏝️</span>
                </div>
                <h1 class="brand-title">São Tomé e Príncipe</h1>
                <p class="brand-subtitle">Descubra o Paraíso Tropical</p>
            </div>

            <div class="login-form">
                <h2>Bem-vindo</h2>
                <p class="form-subtitle">Entre para explorar as maravilhas do arquipélago</p>
                
                <form id="formLogin" onsubmit="return false;">
                    <div class="input-group">
                        <label for="username">
                            <span class="input-icon">👤</span>
                            Usuário
                        </label>
                        <input type="text" id="username" placeholder="Digite seu nome" required>
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <span class="input-icon">🔒</span>
                            Senha
                        </label>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="btn-login" onclick="iniciarMergulho()">
                        <span class="btn-text">Mergulhar no Paraíso</span>
                        <span class="btn-icon">🌊</span>
                    </button>
                </form>

                <div class="quick-access">
                    <p>Ou acesso rápido:</p>
                    <button class="btn-guest" onclick="iniciarMergulho()">
                        Entrar como Visitante
                    </button>
                </div>
            </div>

            <div class="features">
                <div class="feature-item">
                    <span class="feature-icon">🏖️</span>
                    <p>Praias Paradisíacas</p>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🏨</span>
                    <p>Hotéis de Luxo</p>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🌴</span>
                    <p>Natureza Exuberante</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Efeito de Túnel 3D e Mergulho -->
    <div id="diveEffect" class="dive-effect">
        <!-- Túnel 3D -->
        <div class="tunnel-container">
            <div class="tunnel-ring" style="--i: 1"></div>
            <div class="tunnel-ring" style="--i: 2"></div>
            <div class="tunnel-ring" style="--i: 3"></div>
            <div class="tunnel-ring" style="--i: 4"></div>
            <div class="tunnel-ring" style="--i: 5"></div>
            <div class="tunnel-ring" style="--i: 6"></div>
            <div class="tunnel-ring" style="--i: 7"></div>
            <div class="tunnel-ring" style="--i: 8"></div>
            <div class="tunnel-ring" style="--i: 9"></div>
            <div class="tunnel-ring" style="--i: 10"></div>
            <div class="tunnel-ring" style="--i: 11"></div>
            <div class="tunnel-ring" style="--i: 12"></div>
            <div class="tunnel-ring" style="--i: 13"></div>
            <div class="tunnel-ring" style="--i: 14"></div>
            <div class="tunnel-ring" style="--i: 15"></div>
            <div class="tunnel-ring" style="--i: 16"></div>
            <div class="tunnel-ring" style="--i: 17"></div>
            <div class="tunnel-ring" style="--i: 18"></div>
            <div class="tunnel-ring" style="--i: 19"></div>
            <div class="tunnel-ring" style="--i: 20"></div>
        </div>
        
        <!-- Partículas 3D -->
        <div class="particles-3d">
            <div class="particle-3d" style="--x: 10%; --y: 20%; --delay: 0s"></div>
            <div class="particle-3d" style="--x: 30%; --y: 50%; --delay: 0.2s"></div>
            <div class="particle-3d" style="--x: 50%; --y: 10%; --delay: 0.4s"></div>
            <div class="particle-3d" style="--x: 70%; --y: 60%; --delay: 0.6s"></div>
            <div class="particle-3d" style="--x: 90%; --y: 30%; --delay: 0.8s"></div>
            <div class="particle-3d" style="--x: 20%; --y: 70%; --delay: 1s"></div>
            <div class="particle-3d" style="--x: 60%; --y: 40%; --delay: 1.2s"></div>
            <div class="particle-3d" style="--x: 80%; --y: 80%; --delay: 1.4s"></div>
            <div class="particle-3d" style="--x: 15%; --y: 45%; --delay: 0.3s"></div>
            <div class="particle-3d" style="--x: 45%; --y: 75%; --delay: 0.7s"></div>
            <div class="particle-3d" style="--x: 75%; --y: 15%; --delay: 1.1s"></div>
            <div class="particle-3d" style="--x: 85%; --y: 55%; --delay: 0.5s"></div>
            <div class="particle-3d" style="--x: 25%; --y: 85%; --delay: 0.9s"></div>
            <div class="particle-3d" style="--x: 55%; --y: 25%; --delay: 1.3s"></div>
            <div class="particle-3d" style="--x: 35%; --y: 65%; --delay: 0.1s"></div>
            <div class="particle-3d" style="--x: 65%; --y: 35%; --delay: 1.5s"></div>
        </div>
        
        <!-- Efeito de Água -->
        <div class="water-splash">
            <div class="bubble bubble1"></div>
            <div class="bubble bubble2"></div>
            <div class="bubble bubble3"></div>
            <div class="bubble bubble4"></div>
            <div class="bubble bubble5"></div>
            <div class="bubble bubble6"></div>
        </div>
        
        <!-- Texto de Mergulho -->
        <div class="dive-text">
            <h2>Mergulhando no Paraíso...</h2>
            <div class="loading-waves">
                <div class="loading-wave"></div>
                <div class="loading-wave"></div>
                <div class="loading-wave"></div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
